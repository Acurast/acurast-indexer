version: '3'

services:
  app:
    build: .
    command: ["acurast-indexer", "-e", "local"]
    ports:
      - 8000:8000
    volumes:
      - ./configuration:/app/configuration
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
  db:
    image: postgres:16
    volumes:
      - psql:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: acurast
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: pg_isready -U postgres
      interval: 3s
      timeout: 10s
      retries: 10
    ports:
      - "5433:5432"

volumes:
  psql:
    external: false
